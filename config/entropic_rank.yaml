defaults:
  - models
  - evaluation
  - plotting
  - _self_

entropic_rank:
  work_dir: ${oc.env:WORK}
  save_subdir: entropic_rank

  data_dir: ${entropic_rank.work_dir}/data/base40
  system_names: null
  num_subdirs: null
  num_samples_per_subdir: null

  context_length: 512
  prediction_length: 512
  window_style: sampled
  num_test_instances: 1
  window_stride: 1
  window_start_time: null
  random_seed: ${eval.rseed}

  max_series_per_system: null
  max_windows_per_series: null
  max_windows_total: null

  num_samples: 10
  deterministic: false

  attention_types:
    chronos:
      - ca
      - sa
    chronos_bolt:
      - ca
      - sa
    timesfm:
      - attn
    toto:
      - attn

  include_combined: true
  plot_individual_curves: true
  curve_alpha: 0.12
  individual_linewidth: 1.0
  median_linewidth: 2.8
  figure_size: [9, 4.5]
  dpi: 300
  show_grid: true
  file_format: png
  epsilon: 1e-8
  overlay:
    color_mode: darken  # options: darken, match, fixed
    color_factor: 0.6
    fixed_color: "#000000"

models_to_run:
  - chronos
  - chronos_bolt
  - timesfm
  - toto
