entropic_rank:
  work_dir: ${oc.env:WORK}
  save_subdir: entropic_rank_v2

  data_dir: ${entropic_rank.work_dir}/data/base40
  system_names: null
  num_subdirs: null
  num_samples_per_subdir: null

  context_length: 512
  prediction_length: 512
  window_style: sampled
  num_test_instances: 1
  window_stride: 1
  window_start_time: null
  random_seed: ${eval.rseed}

  max_series_per_system: null
  max_windows_per_series: null
  max_windows_total: null

  num_samples: 20
  deterministic: false

  attention_types:
    chronos:
      - ca
      - sa
    chronos_bolt:
      - ca
      - sa
    timesfm:
      - attn
    toto:
      - attn

  epsilon: 1e-8

models_to_run:
  - chronos
  # - chronos_bolt
  # - timesfm
  # - toto
